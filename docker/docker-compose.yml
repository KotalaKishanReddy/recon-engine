version: '3.8'

services:
  recon-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: recon-engine:latest
    volumes:
      - ../output:/app/output
      - ../scopes:/app/scopes
    # Usage:
    #   docker compose -f docker/docker-compose.yml run --rm recon-engine --csv /app/scopes/scope.csv --profile fast
    entrypoint: ["python3", "main.py"]
