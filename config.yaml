# ReconEngine Configuration

tools:
  subfinder: subfinder
  amass: amass
  httpx: httpx
  nmap: nmap
  nuclei: nuclei
  ffuf: ffuf
  gowitness: gowitness
  wafw00f: wafw00f
  whatweb: whatweb
  paramspider: paramspider

api_keys:
  shodan: ""
  securitytrails: ""
  virustotal: ""
  chaos: ""

# Max domains processed concurrently during passive phase (avoid DNS rate-limits)
passive_concurrency: 5

profiles:
  fast:
    passive: true
    active: true
    vuln: false
    screenshots: false
    threads: 20
    rate_limit: 150
    # per-phase hard timeouts (seconds)
    passive_timeout: 600       # 10 min total for all passive tasks
    per_domain_timeout: 240    # 4 min per domain (subfinder+amass+crt.sh)
    active_timeout: 900        # 15 min total active phase
    vuln_timeout: 1800         # 30 min total vuln phase (skipped in fast)
    subfinder_timeout: 120
    amass_timeout: 180
    httpx_timeout: 600
    nmap_timeout: 600
    nuclei_timeout: 1800
    ffuf_timeout: 300
    waybackurls_timeout: 120
    paramspider_timeout: 120
    wafw00f_timeout: 30
    gowitness_timeout: 600

  deep:
    passive: true
    active: true
    vuln: true
    screenshots: true
    threads: 10
    rate_limit: 50
    passive_timeout: 1800      # 30 min
    per_domain_timeout: 600    # 10 min per domain
    active_timeout: 2400       # 40 min
    vuln_timeout: 7200         # 2 hours
    subfinder_timeout: 300
    amass_timeout: 600
    httpx_timeout: 1200
    nmap_timeout: 1200
    nuclei_timeout: 3600
    ffuf_timeout: 600
    waybackurls_timeout: 300
    paramspider_timeout: 240
    wafw00f_timeout: 30
    gowitness_timeout: 1200

  stealth:
    passive: true
    active: false
    vuln: false
    screenshots: false
    threads: 5
    rate_limit: 10
    passive_timeout: 1200      # 20 min (slower tools)
    per_domain_timeout: 480
    active_timeout: 0
    vuln_timeout: 0
    subfinder_timeout: 240
    amass_timeout: 480
    httpx_timeout: 600
    nmap_timeout: 0
    nuclei_timeout: 0
    ffuf_timeout: 0
    waybackurls_timeout: 180
    paramspider_timeout: 180
    wafw00f_timeout: 0
    gowitness_timeout: 0

default_profile: fast

output_dir: ./output

nuclei_tags:
  - exposure
  - misconfig
  - takeover
  - cve
  - default-logins
  - panel

nmap_top_ports: 1000
nmap_flags: "-sV -sC --open"

ffuf_wordlist: /usr/share/wordlists/dirb/common.txt

scoring:
  nuclei_critical: 100
  nuclei_high: 80
  nuclei_medium: 50
  nuclei_low: 20
  open_admin_panel: 70
  subdomain_takeover: 90
  exposed_git: 85
  many_open_ports: 40
  juicy_params: 35
  nmap_high_risk_port: 55
  nmap_medium_risk_port: 30
  # C-08: priority label thresholds — tune without touching scorer.py
  # Findings with interest_score >= high_threshold are marked HIGH (worth probing).
  # Findings with interest_score >= medium_threshold are marked MEDIUM.
  priority_high_threshold: 70
  priority_medium_threshold: 40
