# ReconEngine Configuration

tools:
  subfinder: subfinder
  amass: amass
  httpx: httpx
  nmap: nmap
  nuclei: nuclei
  ffuf: ffuf
  gowitness: gowitness
  wafw00f: wafw00f
  whatweb: whatweb
  paramspider: paramspider
  puredns: puredns   # DNS-01: add puredns to tool list

api_keys:
  shodan: ""
  securitytrails: ""
  virustotal: ""
  chaos: ""

# Max domains processed concurrently during passive phase (avoid DNS rate-limits)
passive_concurrency: 5

profiles:
  fast:
    passive: true
    active: true
    vuln: false
    screenshots: false
    threads: 20
    rate_limit: 50        # HTTP-01: was 150 — lowered to 50 for WAF evasion
    # per-phase hard timeouts (seconds)
    passive_timeout: 600
    per_domain_timeout: 240
    active_timeout: 900
    vuln_timeout: 1800
    subfinder_timeout: 120
    amass_timeout: 180
    httpx_timeout: 600
    nmap_timeout: 600
    nuclei_timeout: 1800
    ffuf_timeout: 300
    waybackurls_timeout: 120
    paramspider_timeout: 120
    wafw00f_timeout: 30
    gowitness_timeout: 600
    dns_resolve_timeout: 300   # DNS-01: puredns pre-filter timeout

  deep:
    passive: true
    active: true
    vuln: true
    screenshots: true
    threads: 10
    rate_limit: 30        # HTTP-01: was 50 — extra conservative for deep scans on large infra
    passive_timeout: 1800
    per_domain_timeout: 600
    active_timeout: 2400
    vuln_timeout: 7200
    subfinder_timeout: 300
    amass_timeout: 600
    httpx_timeout: 1200
    nmap_timeout: 1200
    nuclei_timeout: 3600
    ffuf_timeout: 600
    waybackurls_timeout: 300
    paramspider_timeout: 240
    wafw00f_timeout: 30
    gowitness_timeout: 1200
    dns_resolve_timeout: 600   # DNS-01: longer for 400+ subdomain lists

  stealth:
    passive: true
    active: false
    vuln: false
    screenshots: false
    threads: 5
    rate_limit: 10
    passive_timeout: 1200
    per_domain_timeout: 480
    active_timeout: 0
    vuln_timeout: 0
    subfinder_timeout: 240
    amass_timeout: 480
    httpx_timeout: 600
    nmap_timeout: 0
    nuclei_timeout: 0
    ffuf_timeout: 0
    waybackurls_timeout: 180
    paramspider_timeout: 180
    wafw00f_timeout: 0
    gowitness_timeout: 0
    dns_resolve_timeout: 480

default_profile: fast

output_dir: ./output

nuclei_tags:
  - exposure
  - misconfig
  - takeover
  - cve
  - default-logins
  - panel

nmap_top_ports: 1000
nmap_flags: "-sV -sC --open"

ffuf_wordlist: /usr/share/wordlists/dirb/common.txt

scoring:
  nuclei_critical: 100
  nuclei_high: 80
  nuclei_medium: 50
  nuclei_low: 20
  open_admin_panel: 70
  subdomain_takeover: 90
  exposed_git: 85
  many_open_ports: 40
  juicy_params: 35
  nmap_high_risk_port: 55
  nmap_medium_risk_port: 30
  priority_high_threshold: 70
  priority_medium_threshold: 40
